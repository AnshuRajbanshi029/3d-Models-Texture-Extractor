<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Texture Color Extractor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        /* UI Panel Styling */
        #ui-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 320px;
            background: rgba(30, 30, 30, 0.85);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: #fff;
        }

        .status-msg {
            color: #4a90e2;
            font-size: 13px;
            margin-bottom: 5px;
            min-height: 1.5em;
        }

        /* File Upload Styling */
        .upload-container {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .upload-container:hover {
            border-color: #4a90e2;
            background: rgba(74, 144, 226, 0.1);
        }

        .upload-container input[type="file"] {
            display: none;
        }

        .upload-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .upload-text {
            font-size: 14px;
            color: #aaa;
        }

        /* Color Palette */
        .palette-section {
            margin-top: 10px;
            border-top: 1px solid #444;
            padding-top: 15px;
        }

        .palette-section h3 {
            font-size: 14px;
            margin: 0 0 12px 0;
            color: #eee;
            font-weight: 500;
        }

        .color-swatches {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .swatch-container {
            position: relative;
        }

        .swatch {
            width: 42px;
            height: 42px;
            border-radius: 8px;
            border: 2px solid #555;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .swatch:hover {
            transform: scale(1.15) translateY(-2px);
            border-color: #fff;
            z-index: 2;
        }

        .swatch:active {
            transform: scale(0.95);
        }

        .no-colors-msg {
            font-size: 13px;
            color: #666;
            font-style: italic;
            width: 100%;
            text-align: center;
            padding: 10px 0;
        }

        /* Toast Notification */
        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: #4a90e2;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
            pointer-events: none;
        }

        #toast.show {
            bottom: 30px;
        }

        .instruction {
            font-size: 12px;
            color: #888;
            margin-top: 10px;
            line-height: 1.6;
            text-align: center;
        }
    </style>

    <!-- Import Three.js and Addons -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>

    <div id="ui-panel">
        <h2>Texture Color Extractor</h2>
        <div id="status" class="status-msg">Waiting for model...</div>

        <!-- File Upload Area -->
        <div class="upload-container" onclick="document.getElementById('file-input').click()">
            <input type="file" id="file-input" accept=".glb,.gltf">
            <div class="upload-icon">📁</div>
            <div class="upload-text">Click to Upload GLB/GLTF</div>
        </div>

        <!-- Detected Colors Palette -->
        <div class="palette-section" id="palette-section">
            <h3>🎨 Extracted Hex Colors</h3>
            <div class="color-swatches" id="color-swatches">
                <span class="no-colors-msg">Upload a model to extract colors</span>
            </div>
        </div>

        <div class="instruction">
            Click on any extracted color swatch to instantly copy its Hex code to your clipboard.
            <br><br>
            Left Click + Drag to rotate the model. Scroll to zoom.
        </div>
    </div>

    <div id="toast">Copied to clipboard 🎉</div>
    <div id="canvas-container"></div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Core Setup ---
        const container = document.getElementById('canvas-container');
        const statusEl = document.getElementById('status');
        const toastEl = document.getElementById('toast');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a1a);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 15);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        container.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // --- Lighting ---
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6);
        hemiLight.position.set(0, 20, 0);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        const backLight = new THREE.DirectionalLight(0xffffff, 0.8);
        backLight.position.set(-5, 5, -7);
        scene.add(backLight);

        let modelGroup = new THREE.Group();
        scene.add(modelGroup);

        // --- Toast Notification ---
        let toastTimeout;
        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
            }, 2500);
        }

        function setStatus(msg, keep = false) {
            statusEl.textContent = msg;
            if (!keep) {
                setTimeout(() => {
                    if (statusEl.textContent === msg) statusEl.textContent = "Ready";
                }, 3000);
            }
        }

        // --- Model Loading & Color Extraction ---
        const gltfLoader = new GLTFLoader();

        document.getElementById('file-input').addEventListener('change', function (e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            setStatus("Loading model...", true);
            document.querySelector('.upload-text').textContent = file.name;

            // Clear previous model
            while (modelGroup.children.length > 0) {
                modelGroup.remove(modelGroup.children[0]);
            }

            gltfLoader.load(url, (gltf) => {
                const root = gltf.scene;
                const meshes = [];

                // Re-center model
                const box = new THREE.Box3().setFromObject(root);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());

                root.position.x += (root.position.x - center.x);
                root.position.y += (root.position.y - center.y);
                root.position.z += (root.position.z - center.z);

                const maxDim = Math.max(size.x, size.y, size.z);
                camera.position.set(0, size.y * 0.2, maxDim * 2.2);
                controls.target.set(0, 0, 0);

                // Collect meshes for extraction
                root.traverse((child) => {
                    if (child.isMesh) {
                        if (child.material.map) {
                            child.material.map.colorSpace = THREE.SRGBColorSpace;
                        }
                        meshes.push(child);
                    }
                });

                modelGroup.add(root);
                setStatus("Extracting texture colors...", true);

                // Allow UI to update before heavy extraction
                setTimeout(() => extractColors(meshes), 50);

            }, undefined, (err) => {
                console.error(err);
                setStatus("Error loading model", true);
            });
        });

        // --- The Extraction Logic ---
        function extractColors(meshes) {
            const samplerCanvas = document.createElement('canvas');
            const sSize = 256; // Sampling resolution
            samplerCanvas.width = sSize;
            samplerCanvas.height = sSize;
            const samplerCtx = samplerCanvas.getContext('2d', { willReadFrequently: true });

            const colorBuckets = {};

            for (const mesh of meshes) {
                const mat = mesh.material;
                const texMap = mat.map;

                // If it has a texture image, sample it
                if (texMap && texMap.image) {
                    try {
                        samplerCtx.clearRect(0, 0, sSize, sSize);
                        samplerCtx.drawImage(texMap.image, 0, 0, sSize, sSize);
                        const imgData = samplerCtx.getImageData(0, 0, sSize, sSize);
                        const pixels = imgData.data;

                        // Sample every Nth pixel to speed it up and avoid noise
                        for (let i = 0; i < pixels.length; i += 32) {
                            const r = pixels[i], g = pixels[i + 1], b = pixels[i + 2], a = pixels[i + 3];

                            if (a < 128) continue; // Skip totally transparent pixels

                            // Quantize colors (group wildly similar pixels into the same bucket)
                            const qr = Math.round(r / 20) * 20;
                            const qg = Math.round(g / 20) * 20;
                            const qb = Math.round(b / 20) * 20;

                            const key = `${qr},${qg},${qb}`;

                            if (!colorBuckets[key]) {
                                colorBuckets[key] = { r: 0, g: 0, b: 0, count: 0 };
                            }
                            const bucket = colorBuckets[key];
                            bucket.r += r;
                            bucket.g += g;
                            bucket.b += b;
                            bucket.count++;
                        }
                    } catch (err) {
                        console.warn("Could not read texture for mesh:", mesh.name, err);
                    }
                }
                // If no texture but has a solid color
                else if (mat.color) {
                    const r = Math.round(mat.color.r * 255);
                    const g = Math.round(mat.color.g * 255);
                    const b = Math.round(mat.color.b * 255);
                    const key = `${r},${g},${b}`;
                    if (!colorBuckets[key]) {
                        // Give solid colors a high simulated pixel count so they show up
                        colorBuckets[key] = { r: r * 500, g: g * 500, b: b * 500, count: 500 };
                    }
                }
            }

            // Average the buckets and sort by frequency
            const sorted = Object.values(colorBuckets)
                .map(b => ({
                    r: Math.round(b.r / b.count),
                    g: Math.round(b.g / b.count),
                    b: Math.round(b.b / b.count),
                    count: b.count
                }))
                // Filter out absolute blacks/whites as they are often background/padding
                .filter(c => {
                    const brightness = (c.r + c.g + c.b) / 3;
                    return brightness > 10 && brightness < 245;
                })
                .sort((a, b) => b.count - a.count);

            // Take top 16 distinct colors
            const extracted = sorted.slice(0, 16);
            renderSwatches(extracted);

            if (extracted.length > 0) {
                setStatus(`Extracted ${extracted.length} colors from model textures.`, true);
            } else {
                setStatus("No extractable textures found on model.", true);
            }
        }

        function rgbToHex(r, g, b) {
            return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
        }

        function renderSwatches(colors) {
            const container = document.getElementById('color-swatches');
            container.innerHTML = '';

            if (colors.length === 0) {
                container.innerHTML = '<span class="no-colors-msg">No colors detected</span>';
                return;
            }

            colors.forEach(c => {
                const hex = rgbToHex(c.r, c.g, c.b);
                const wrapper = document.createElement('div');
                wrapper.className = 'swatch-container';

                const swatch = document.createElement('div');
                swatch.className = 'swatch';
                swatch.style.backgroundColor = hex;
                swatch.title = `Click to copy ${hex}`;

                swatch.addEventListener('click', () => {
                    navigator.clipboard.writeText(hex).then(() => {
                        showToast(`Copied ${hex} to clipboard`);
                    }).catch(err => {
                        console.error('Could not copy text: ', err);
                        // Fallback
                        const textArea = document.createElement("textarea");
                        textArea.value = hex;
                        document.body.appendChild(textArea);
                        textArea.select();
                        document.execCommand("copy");
                        document.body.removeChild(textArea);
                        showToast(`Copied ${hex} to clipboard`);
                    });
                });

                wrapper.appendChild(swatch);
                container.appendChild(wrapper);
            });
        }

        // --- Render Loop ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // Window Resize Logic
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start render loop
        animate();

    </script>
</body>

</html>
